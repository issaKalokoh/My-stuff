<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>

body{

}
  .container{

      border: solid;
      background-color: rgba(71, 243, 255, 0.801);
      width: max-content;
      margin: auto;
      justify-content: center;
      align-items: center;
      margin-top: 300px;

    }
   
  </style>

</head>
<body>
  <div>
    <div class="container">

      <p style="align-content: center;">Simple Calculator</p>

      <div class="input_group">
        <label for="number1">Enter Num 1</label>
        <input type="number" id="number1" value="0">
      </div>

      <div class="input_group">
        <label for="number2">Enter Num 2</label>
        <input type="number" id="number2" value="0">
      </div>
      <button type="submit" onclick="add()">Add</button>

      <div class="input_group">
        <label for="result">Result</label>
        <input type="number" id="result" disabled>
      </div>

    </div>
  </div>

  <script>
    function add(){
      const num1= parseInt(document.getElementById("number1").value) || 0;
      const num2= parseInt(document.getElementById("number2").value) || 0;

      

      document.getElementById('result').value = num1+num2
    }

  </script>
  
</body>
</html>
